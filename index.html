<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Satellight — Live Geolocation Interface</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='45' fill='%23256f3c'/%3E%3Ccircle cx='50' cy='50' r='15' fill='%23fff'/%3E%3C/svg%3E">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <div id="app">

    <header id="topbar" role="banner">
      <span class="logo" aria-label="Satellight">Satellight</span>
      <div id="connection-status" aria-live="polite" aria-atomic="true">
        <span id="status-indicator" class="indicator offline" aria-hidden="true"></span>
        <span id="status-text">Disconnected</span>
      </div>
    </header>

    <main id="map-container" aria-label="Map area">
      <div id="map" role="application" aria-label="Live geolocation map" tabindex="0"></div>
    </main>

    <footer id="coords-bar" role="contentinfo" aria-label="Current coordinates">
      <span class="coord-label" aria-hidden="true">Lat</span>
      <span id="lat-display" class="coord-value" aria-label="Latitude">--</span>
      <span class="coord-divider" aria-hidden="true">|</span>
      <span class="coord-label" aria-hidden="true">Lng</span>
      <span id="lng-display" class="coord-value" aria-label="Longitude">--</span>
    </footer>

    <div id="permission-overlay" class="overlay hidden" role="alertdialog" aria-modal="true" aria-labelledby="perm-title" aria-describedby="perm-message">
      <div class="overlay-backdrop"></div>
      <div class="overlay-card" tabindex="-1">
        <div class="overlay-icon" id="perm-icon" aria-hidden="true">📍</div>
        <h2 id="perm-title">Location Access Required</h2>
        <p id="perm-message">Requesting your location...</p>
        <button id="retry-btn" class="btn hidden" aria-describedby="perm-message">Try Again</button>
      </div>
    </div>

  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="js/geolocation.js"></script>
  <script src="js/map.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
