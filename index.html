<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Satellight — Live Geolocation Interface</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='45' fill='%23256f3c'/%3E%3Ccircle cx='50' cy='50' r='15' fill='%23fff'/%3E%3C/svg%3E">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <div id="app">

    <header id="topbar">
      <span class="logo">Satellight</span>
      <div class="topbar-controls">
        <button id="follow-btn" class="btn-icon active" title="Follow my location" aria-pressed="true" aria-label="Follow my location">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3M4.93 4.93l2.12 2.12M16.95 16.95l2.12 2.12M4.93 19.07l2.12-2.12M16.95 7.05l2.12-2.12"/></svg>
        </button>
        <div id="connection-status">
          <span id="status-indicator" class="indicator offline"></span>
          <span id="status-text">Disconnected</span>
        </div>
      </div>
    </header>

    <main id="map-container" aria-label="Map area">
      <div id="map" role="application" aria-label="Live geolocation map" tabindex="0"></div>
    </main>

    <footer id="coords-bar">
      <span class="coord-label">Lat</span>
      <span id="lat-display" class="coord-value">--</span>
      <span class="coord-divider">|</span>
      <span class="coord-label">Lng</span>
      <span id="lng-display" class="coord-value">--</span>
      <span class="coord-divider">|</span>
      <span class="coord-label">Acc</span>
      <span id="acc-display" class="coord-value acc-value">--</span>
      <button id="coord-format-toggle" class="btn-icon coord-format-btn" title="Toggle DD/DMS" aria-label="Toggle coordinate format">DD</button>
    </footer>

    <div id="permission-overlay" class="overlay hidden" role="alertdialog" aria-modal="true" aria-labelledby="perm-title">
      <div class="overlay-backdrop"></div>
      <div class="overlay-card" tabindex="-1">
        <div class="overlay-icon" id="perm-icon">📍</div>
        <h2 id="perm-title">Location Access Required</h2>
        <p id="perm-message">Requesting your location...</p>
        <button id="retry-btn" class="btn hidden" aria-describedby="perm-message">Try Again</button>
      </div>
    </div>

  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="js/geolocation.js"></script>
  <script src="js/map.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
