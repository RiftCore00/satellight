name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install server dependencies
        run: npm install
        working-directory: server

      - name: Validate HTML
        uses: Cyb3r-Jak3/html5validator-action@v7.2.0
        with:
          root: .
          css: true

      - name: Check JavaScript syntax (client)
        run: |
          for f in js/geolocation.js js/map.js js/app.js; do
            node --check "$f" && echo "  \u2713 $f"
          done

      - name: Check JavaScript syntax (server)
        run: |
          node --check index.js && echo "  \u2713 server/index.js"
        working-directory: server

      - name: Validate server starts
        run: |
          timeout 3 node index.js & sleep 1 && kill $! 2>/dev/null; true
        working-directory: server
